name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flatmate-backend ./flatmate-gram/server

      - name: Build frontend image
        run: docker build \
          --build-arg VITE_API_URL=https://flatmate-backend-latest.onrender.com \
          -t ${{ secrets.DOCKER_USERNAME }}/flatmate-frontend ./flatmate-gram/client

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flatmate-backend

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flatmate-frontend
